<!DOCTYPE html>

<html><head>
<title id="title"></title>
<link rel="icon" href="image/icon.jpg" >

<script src="./data.js"></script>

<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="./mobile.css">
</head>

<body>
<div class="content">
    <a href="mobile_en.html"><font size=6>[English]</font></a>
    <br><br><br><br>
    <div id="container">
        <table align="center">
            <tbody><tr>
            <td>
                <div id="img"></div>
            </td>
            </tr></tbody>
        </table>
        <br><br><br>
        <div id="DocInfoHead">
           <div id="name"></div>
        </div><br><br>
        <table>
            <td style="height:20px"></td>
        </table>
        <div style="text-align:center;">
            <font size=10 id="job"></font>
        </div>
        <table>
            <td style="height:10px"></td>
        </table>
        <div style="text-align:center;">
            <font size=10 id="institute"></font>
        </div>
        <table>
            <td style="height:85px"></td>
        </table>
        <div style="text-align:center;">
            <div id="my_link"></div>
        </div>
        <br><br><br><br>

        <h2>个人简介</h2><br>
        <table>
            <td style="width:10px"></td>
            <td valign="middle">
                <div id="about"></div>
            </td>
        </table><br><br>

        <div id="news-section">
        <h2>动态</h2><br>
        <table>
            <tbody><tr>
            <td style="width:2px"></td>
            <td valign="middle">
                <p><font style="color: #DD0000" id="break_news"></font></p>
                <div id="news"></div>
            </td>
            </tr></tbody>
        </table><br><br>
        </div>

        <div id="publications-section">
        <h2>出版物</h2><br>
        <div id="Text">
        <table>
            <td style="width:10px"></td>
            <td valign="middle">
                <div id="selected_pub"></div>
                <b>>> <a href="paper/mobile.html">全部出版物</a></b>
            </td>
        </table>
        </div><br><br>
        </div>

        <div id="projects-section">
        <h2>项目</h2><br>
        <div id="Text">
        <table>
            <td style="width:10px"></td>
            <td valign="middle">
                <div id="selected_proj"></div>
                <b>>> <a href="project/mobile.html">全部项目</a></b>
            </td>
        </table>
        </div><br><br>
        </div>

        <div id="teaching-section">
            <a name="teaching-section"></a><br>
            <h2>教学</h2><br>
            <table>
                <tbody><tr>
                <td style="width:10px"></td>
                <td valign="middle">
                    <div id="teaching"></div>
                </td>
                </tr></tbody>
            </table><br><br>
        </div>

        <h2>经历</h2><br>
        <div id="exp_icon"></div>
        <table>
            <tbody><tr>
            <td style="width:10px"></td>
            <td valign="middle">
                <div id="exp"></div>
            </td>
            </tr></tbody>
        </table><br><br>

        <div id="honors-section">
            <h2>荣誉</h2><br>
            <table>
                <tbody><tr>
                <td style="width:2px"></td>
                <td valign="middle">
                    <div id="hornor"></div>
                </td>
                </tr></tbody>
            </table><br><br>
        </div>

        <h2>学术活动</h2><br>
        <div id="activity"></div><br><br>

        <div id="misc-section">
        <h2>其他方面</h2><br>
        <table>
            <td style="width:10px"></td>
            <td valign="middle">
                <div id="m"></div>
            </td>
        </table><br><br>
        </div>

        <h2>联系方式</h2><br>
        <table>
            <tbody><tr>
            <td style="width:10px"></td>
            <td valign="middle">
                <div id="ct"></div>
            </td>
            </tr></tbody>
        </table><br><br>

    </div>
</div>

<center id="last_update"></center><br>
<center id="copyright"></center><br>

<script>
    document.getElementById("title").textContent = title_zh;
    document.getElementById("img").innerHTML = img_html_m;
    document.getElementById("name").textContent = me.name_zh;
    document.getElementById("job").textContent = me.job_zh;
    document.getElementById("institute").textContent = me.institute_zh;
    document.getElementById("my_link").innerHTML = my_link_html_zh;
    document.getElementById("about").innerHTML = about_html_zh;
    document.getElementById("news").innerHTML = news_html_m_zh;
    document.getElementById("break_news").textContent = break_news_zh;
    // Hide entire news section if no news
    if (news.length === 0) {
        document.getElementById("news-section").style.display = "none";
    }
    document.getElementById("selected_proj").innerHTML = selected_proj_html_m_zh;
    document.getElementById("selected_pub").innerHTML = selected_pub_html_m_zh;
    if (selected_proj.length === 0) {
        document.getElementById("projects-section").style.display = "none";
    }
    if (selected_pub.length === 0) {
        document.getElementById("publications-section").style.display = "none";
    }
    document.getElementById("exp_icon").innerHTML = experience_icon_html_m_zh;
    document.getElementById("exp").innerHTML = experience_html_m_zh;
    document.getElementById("hornor").innerHTML = hornor_html_m_zh;
    // Hide entire honors section if no honors
    if (hornor.length === 0) {
        document.getElementById("honors-section").style.display = "none";
    }
    document.getElementById("activity").innerHTML = activity_html_m_zh;
    document.getElementById("teaching").innerHTML = teaching_html_m_zh;
    // Hide entire teaching section if no teaching
    if (teaching.length === 0) {
        document.getElementById("teaching-section").style.display = "none";
    }
    document.getElementById("m").innerHTML = misc_html_zh;
    // Hide entire misc section if no misc (navigation link will be hidden by adjustNavigation)
    if (misc_zh.length === 0) {
        document.getElementById("misc-section").style.display = "none";
    }
    document.getElementById("ct").innerHTML = contact_html_m_zh;
    document.getElementById("last_update").innerHTML = last_update_html_m_zh;
    document.getElementById("copyright").innerHTML = copyright_html_m_zh;
</script>
</body></html>
