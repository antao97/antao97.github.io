<script type="text/javascript" language="javascript">
	function addEventHandler(target, type, func){
	if (target.addEventListener)
	target.addEventListener(type, func, false);
	else if (target.attachEvent)
	target.attachEvent("on" + type, func);
	else target["on" + type] = func;
	}
	var advIniTop = 0;
	function move(){
	var layer1 = document.getElementById("nav1");
	if (layer1) layer1.style.top = advIniTop + document.body.scrollTop || document.documentElement.scrollTop + 10 + "px";
	}
	addEventHandler(window, "scroll", move);
</script>

	}
	document.getElementById("selected_proj").innerHTML = selected_proj_html_zh;
	document.getElementById("exp").innerHTML = experience_html_zh;
	document.getElementById("hornor").innerHTML = hornor_html_zh;
	// Hide entire honors section if no honors (navigation link will be hidden by adjustNavigation)
	if (hornor.length === 0) {
		document.getElementById("honors-section").style.display = "none";
	}
	document.getElementById("activity").innerHTML = activity_html_zh;
	document.getElementById("teaching").innerHTML = teaching_html_zh;
	// Hide entire teaching section if no teaching (navigation link will be hidden by adjustNavigation)
	if (teaching.length === 0) {
		document.getElementById("teaching-section").style.display = "none";
	}
	document.getElementById("m").innerHTML = misc_html_zh;
	// Hide entire misc section if no misc (navigation link will be hidden by adjustNavigation)
	if (misc_zh.length === 0) {
		document.getElementById("misc-section").style.display = "none";
	}
	document.getElementById("ct").innerHTML = contact_html_zh;
	document.getElementById("last_update").innerHTML = last_update_html_zh;
	document.getElementById("copyright").innerHTML = copyright_html_zh;

	// Function to hide navigation links for empty sections
	function adjustNavigation() {
		// Helper function to hide a link and its following <br> elements
		function hideNavLink(linkId) {
			var link = document.getElementById(linkId);
			if (!link) return;

			// Hide the link
			link.style.display = "none";

			// Hide all following <br> siblings until next <a> tag
			var next = link.nextSibling;
			while (next && next.nodeType === 1 && next.tagName === 'BR') {
				next.style.display = "none";
				next = next.nextSibling;
			}
		}

		// Check and hide navigation links for empty sections
		// News
		if (news.length === 0) {
			hideNavLink("nav-news");
		}

		// Honors
		if (hornor.length === 0) {
			hideNavLink("nav-honors");
		}

		// Activities
		if (Object.keys(activity).length === 0) {
			hideNavLink("nav-activities");
		}

		// Miscellaneous facts
		if (misc_zh.length === 0 || (misc_zh.length === 1 && misc_zh[0].length === 0)) {
			hideNavLink("nav-misc");
		}

		// Publications (selected projects)
		if (selected_proj.length === 0) {
			hideNavLink("nav-publications");
		}


		// About Me
		if (about_zh.length === 0 || (about_zh.length === 1 && about_zh[0].length === 0)) {
			hideNavLink("nav-about");
		}

		// Experience
		if (experience.length === 0) {
			hideNavLink("nav-experience");
		}

		// Teaching
		if (teaching.length === 0) {
			hideNavLink("nav-teaching");
		}

		// Contact
		if (contact.length === 0) {
			hideNavLink("nav-contact");
		}
	}

	// Adjust navigation based on content
	adjustNavigation();
	</script>
