<!DOCTYPE html>

<html><head>
<title id="title"></title>
<link rel="icon" href="../image/icon.jpg" >

<script src="../data.js"></script>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">

</head>

<body class="paper">
<div class="content">
    <b>>> <a href="../mobile_en.html">Back to Homepage</a></b>
    <br><br><br>
    <div id="container">

    <h2>Full Project List</h2><br><br>
    <script type="text/javascript">
        var paper_html = "";
        for (var i = 0; i < proj_section_order.length; i++) {
            var section = proj_section_order[i];
            var section_html = "";
            for (var key in paper){
                if (paper.hasOwnProperty(key)) {
                    var include = false;
                    if (section.filter_type === "arxiv") {
                        if (paper[key].pub.name === "arXiv"){
                            include = true;
                        }
                    } else if (section.filter_type === "project") {
                        if (paper[key].type === "project" || (paper[key].type === "preprint" && paper[key].pub.name !== "arXiv")){
                            include = true;
                        }
                    } else {
                        if (paper[key].type === section.filter_type){
                            include = true;
                        }
                    }
                    if (include) {
                        section_html += pub(paper[key]);
                    }
                }
            }
            if (section_html !== ""){
                section_html = `<table><td style="width:5px"></td><td valign="middle"><div><h3>${section.name}</h3></div></td></table><br>` + section_html;
                paper_html += section_html;
            }
        }
        </script>
        <div id="paper"></div>


    </div><br><br>

    <b>>> <a href="../mobile_en.html">Back to Homepage</a></b>

</div></div>
</div><br><br>
<script type="text/javascript">
    var last_update_html = `<font size=6 style="color: #3B3B3B">—&nbsp;&nbsp; Last updated: ${last_update.month}, ${last_update.year} &nbsp;&nbsp;—</font>`;
    var copyright_html = `<font size=6 style="color: #BBBBBB">Copyright &copy ${last_update.year} ${me.name}. All Rights Reserved.</font>`;
</script>

<center id="last_update"></center><br>
<center id="copyright"></center><br>

<script>
    document.getElementById("title").textContent = title;
    document.getElementById("paper").innerHTML = paper_html;
    document.getElementById("last_update").innerHTML = last_update_html;
    document.getElementById("copyright").innerHTML = copyright_html;
</script>
</body></html>
