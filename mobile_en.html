    <a href="mobile.html"><font size=6>[中文版]</font></a>

            </tr></tbody>
        </table>
        <br><br><br>

    	   <div id="name"></div>
        </div><br><br>
        <table>
            <td style="height:20px"></td>
        </table>
        <div style="text-align:center;">
            <font size=10 id="job"></font>
    	</div>
        <table>
            <td style="height:10px"></td>
        </table>
        <div style="text-align:center;">
            <font size=10 id="institute"></font>
        </div>
        <table>

        </table>
        <div style="text-align:center;">
            <div id="my_link"></div>
    	</div>
    	<br><br><br><br>

    	<h2>About Me</h2><br>
        <table>
            <td style="width:10px"></td>
            <td valign="middle">

            </td>
        </table><br><br>

        <div id="news-section">

        <table>
            <tbody><tr>
            <td style="width:2px"></td>
            <td valign="middle">
                <p><font style="color: #DD0000" id="break_news"></font></p>
                <div id="news"></div>
            </td>
            </tr></tbody>
        </table><br><br>
        </div>

        <div id="publications-section">
        <h2>Publications</h2><br>
        <div id="Text">
        <table>
            <td style="width:10px"></td>
            <td valign="middle">

                <b>>> <a href="paper/mobile_en.html">Full Publication List</a></b>
            </td>
        </table>
        </div><br><br>
        </div>

            <td style="width:10px"></td>

                </td>
                </tr></tbody>

            <tbody><tr>

        <h2>Activities</h2><br>

            <td style="width:10px"></td>
            <td valign="middle">

        </table><br><br>

        <h2>Contact</h2><br>
        <table>
            <tbody><tr>
            <td style="width:10px"></td>

            </td>
            </tr></tbody>

    </div>
</div>

<center id="last_update"></center><br>
<center id="copyright"></center><br>

<script>
    document.getElementById("title").textContent = title;
    document.getElementById("img").innerHTML = img_html_m;
    document.getElementById("name").textContent = me.name;
    document.getElementById("job").textContent = me.job;
    document.getElementById("institute").textContent = me.institute;
    document.getElementById("my_link").innerHTML = my_link_html;
    document.getElementById("about").innerHTML = about_html;
    document.getElementById("news").innerHTML = news_html_m;
    document.getElementById("break_news").textContent = break_news;
    // Hide entire news section if no news
    if (news.length === 0) {
        document.getElementById("news-section").style.display = "none";
    }
    document.getElementById("selected_proj").innerHTML = selected_proj_html_m;
    document.getElementById("selected_pub").innerHTML = selected_pub_html_m;
    if (selected_proj.length === 0) {
        document.getElementById("projects-section").style.display = "none";
    }
    if (selected_pub.length === 0) {
        document.getElementById("publications-section").style.display = "none";
    }
    document.getElementById("exp_icon").innerHTML = experience_icon_html_m;
    document.getElementById("exp").innerHTML = experience_html_m;
    document.getElementById("hornor").innerHTML = hornor_html_m;
    // Hide entire honors section if no honors
    if (hornor.length === 0) {
        document.getElementById("honors-section").style.display = "none";
    }
    document.getElementById("activity").innerHTML = activity_html_m;
    document.getElementById("teaching").innerHTML = teaching_html_m;
    // Hide entire teaching section if no teaching
    if (teaching.length === 0) {
        document.getElementById("teaching-section").style.display = "none";
    }
    document.getElementById("m").innerHTML = misc_html;
    // Hide entire misc section if no misc (navigation link will be hidden by adjustNavigation)
    if (misc.length === 0) {
        document.getElementById("misc-section").style.display = "none";
    }
    document.getElementById("ct").innerHTML = contact_html_m;
    document.getElementById("last_update").innerHTML = last_update_html_m;
    document.getElementById("copyright").innerHTML = copyright_html_m;
</script>
</body></html>
